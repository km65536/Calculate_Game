<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Puzzle Quest</title>
    <style>
        /* 全体の基本デザイン設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0f1115;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 15px 10px;
            overflow-x: hidden;
        }

        /* ヘッダーエリア */
        header {
            text-align: center;
            margin-bottom: 12px;
            width: 100%;
            max-width: 480px;
        }

        header h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(45deg, #ff3366, #ff9933, #33ccff, #11ff22);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 遊び方アコーディオン */
        .how-to-play-container {
            width: 100%;
            max-width: 480px;
            margin-bottom: 12px;
            background-color: #151922;
            border: 1px solid #2d3748;
            border-radius: 10px;
            overflow: hidden;
        }

        .accordion-header {
            width: 100%;
            padding: 11px 14px;
            background-color: #1a202c;
            color: #33ccff;
            font-size: 13px;
            font-weight: bold;
            text-align: left;
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease;
        }

        .accordion-header:hover {
            background-color: #232d3f;
        }

        .accordion-icon {
            font-size: 11px;
            transition: transform 0.2s ease;
            color: #ff3366;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            background-color: #151922;
            font-size: 12px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .accordion-body {
            padding: 12px 14px;
        }

        .accordion-body p {
            margin-bottom: 10px;
        }

        .accordion-body ul {
            margin-left: 18px;
            margin-bottom: 10px;
        }

        .accordion-body li {
            margin-bottom: 6px;
        }

        /* カラフルな強調色定義 */
        .color-pink {
            color: #ff3366;
            font-weight: bold;
        }
        .color-orange {
            color: #ff9933;
            font-weight: bold;
        }
        .color-blue {
            color: #33ccff;
            font-weight: bold;
        }
        .color-green {
            color: #22ff88;
            font-weight: bold;
        }
        .color-purple {
            color: #cc66ff;
            font-weight: bold;
        }

        /* アコーディオンが開いているときのスタイル */
        .how-to-play-container.open .accordion-icon {
            transform: rotate(180deg);
        }

        /* 【修正】ゲーム画面（Canvas）のラップ容器 */
        /* max-width: 100% を追加し、幅狭スマホ画面からはみ出すのを防止 */
        #game-container {
            width: 100%;
            max-width: 480px;
            background-color: #000000;
            border: 2px solid #2d3748;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            margin-bottom: 6px;
        }

        canvas {
            display: block;
        }

        /* バージョン情報表示用のスタイル */
        #version-display {
            width: 100%;
            max-width: 480px;
            text-align: right;
            font-size: 11px;
            color: #4a5568;
            padding-right: 14px;
            margin-bottom: 12px;
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        /* 操作UIエリア */
        #ui-container {
            width: 100%;
            max-width: 480px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-items: center;
            padding: 5px 10px;
        }

        /* 1手戻す（UNDO）ボタンの配置 */
        .undo-wrapper {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .undo-btn {
            background-color: #1a202c;
            color: #ff9933;
            border: 1px solid #4a5568;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }

        .undo-btn:active {
            transform: scale(0.95);
            background-color: #2d3748;
        }

        .undo-btn span {
            font-size: 10px;
            color: #a0aec0;
        }

        /* 十字キー（バーチャルパッド）の配置 */
        .dpad-container {
            display: grid;
            grid-template-areas: 
                ".    up    ."
                "left  .    right"
                ".    down  .";
            grid-template-columns: repeat(3, 46px);
            grid-template-rows: repeat(3, 46px);
            gap: 4px;
            justify-content: flex-end;
            margin-right: 10px;
        }

        .pad-btn {
            background-color: #1a202c;
            color: #ffffff;
            border: 1px solid #4a5568;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }

        .pad-btn:active {
            transform: scale(0.92);
            background-color: #2d3748;
            border-color: #718096;
        }

        #btn-up    { grid-area: up; }
        #btn-down  { grid-area: down; }
        #btn-left  { grid-area: left; }
        #btn-right { grid-area: right; }
    </style>
</head>
<body>

    <header>
        <h1>MATH PUZZLE QUEST</h1>
    </header>

    <div class="how-to-play-container" id="how-to-play">
        <button class="accordion-header" id="accordion-toggle">
            <span>🎮 遊び方とルールを表示</span>
            <span class="accordion-icon">▼</span>
        </button>
        <div class="accordion-content" id="accordion-content">
            <div class="accordion-body">
                <p>数字と記号のブロックを押し動かし、正しい等式を作るパズルゲームです。</p>
                <p><span class="color-pink">■ クリア条件</span><br>全ての「＝」を挟んだ左辺と右辺の計算結果が一致すると数式が<span class="color-green">黄緑色にネオン発光</span>し、全面達成でステージクリアとなります。</p>
                <p><span class="color-blue">■ ブロックのルール</span></p>
                <ul>
                    <li><span class="color-cyan" style="color: #33ccff; font-weight: bold;">青 / 紫ブロック:</span> 後ろから押して自由に移動可能（連続押しも可）。</li>
                    <li><span class="color-pink">赤枠付きブロック:</span> ガチガチに固定されていて絶対に動きません。</li>
                    <li><span class="color-purple">（ ）ブロック:</span> 掛け算や割り算より先に計算させたい式を挟み込みます。</li>
                </ul>
                <p>※PC版は矢印キーで移動、<span class="color-orange">Zキー</span>で1手戻せます。</p>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="version-display">LOADING VERSION...</div>

    <div id="ui-container">
        <div class="undo-wrapper">
            <button id="btn-undo" class="undo-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff9933" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 7v6h6"></path>
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                </svg>
                1手戻す
                <span>(Zキー)</span>
            </button>
        </div>
        <div class="dpad-container">
            <button id="btn-up" class="pad-btn">↑</button>
            <button id="btn-left" class="pad-btn">←</button>
            <button id="btn-right" class="pad-btn">→</button>
            <button id="btn-down" class="pad-btn">↓</button>
        </div>
    </div>

    <script src="main.js"></script>

    <script>
        const container = document.getElementById('how-to-play');
        const toggleBtn = document.getElementById('accordion-toggle');
        const content = document.getElementById('accordion-content');

        toggleBtn.addEventListener('click', () => {
            const isOpen = container.classList.toggle('open');
            if (isOpen) {
                content.style.maxHeight = content.scrollHeight + "px";
            } else {
                content.style.maxHeight = "0";
            }
        });
    </script>
</body>
</html>
